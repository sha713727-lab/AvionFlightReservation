services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./deploy/.env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-avion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD via --env-file deploy/.env.production}
      POSTGRES_DB: ${POSTGRES_DB:-avion_flight}
    volumes:
      - avion_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - avion

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - avion

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./deploy/.env.production
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-avion}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-avion_flight}?schema=public&connection_limit=10
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      UPLOADS_DIR: /app/uploads
    volumes:
      - avion_uploads:/app/uploads
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - avion

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://aviosupportdesk.com}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://aviosupportdesk.com}
        API_INTERNAL_URL: http://api:4000
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      API_INTERNAL_URL: http://api:4000
    depends_on:
      - api
    networks:
      - avion

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - api
    networks:
      - avion

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./deploy/certbot/www:/var/www/certbot
      - ./deploy/certbot/conf:/etc/letsencrypt
    profiles:
      - tools

volumes:
  avion_pg_data:
  avion_uploads:

networks:
  avion:
    driver: bridge
