# Avion Flight Reservation — Render Blueprint
# https://render.com/docs/blueprint-spec
# Deploys the Next.js frontend as a Node web service.

services:
  - type: web
    name: avion-flight-reservation
    runtime: node
    plan: free
    region: oregon
    rootDir: Frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
