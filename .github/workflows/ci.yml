name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_SITE_URL: https://aviosupportdesk.com

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: avion
          POSTGRES_PASSWORD: avion
          POSTGRES_DB: avion_flight
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U avion -d avion_flight"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://avion:avion@localhost:5432/avion_flight?schema=public
      CORS_ORIGINS: http://localhost:3000
      NODE_ENV: test
      ENABLE_SWAGGER: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run db:seed
        env:
          ALLOW_DESTRUCTIVE_SEED: 'true'
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test