services:
  postgres:
    image: postgres:16-alpine
    container_name: avion-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: avion
      POSTGRES_PASSWORD: avion
      POSTGRES_DB: avion_flight
    volumes:
      - avion_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U avion -d avion_flight']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  avion_pg_data:
